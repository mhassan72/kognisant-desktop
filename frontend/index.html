<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kognisant Core</title>
        <style>
            body {
                background-color: #0f172a; /* matches kognisant-bg */
                margin: 0;
                padding: 0;
            }
            #early-boot-error {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 9999;
                background: #1e293b;
                color: #f8fafc;
                padding: 2rem;
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                    monospace;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <!-- Early boot error UI hidden by default -->
        <div id="early-boot-error" style="display: none">
            <h1 style="color: #ef4444; margin-bottom: 1rem">
                BOOT_LOAD_FAILURE
            </h1>
            <p
                id="error-message"
                style="
                    background: rgba(0, 0, 0, 0.3);
                    padding: 1rem;
                    border-radius: 8px;
                    max-width: 80%;
                    overflow-wrap: break-word;
                "
            ></p>
            <button
                onclick="location.reload()"
                style="
                    margin-top: 2rem;
                    padding: 0.5rem 1rem;
                    background: #38bdf8;
                    color: #0f172a;
                    border: none;
                    border-radius: 4px;
                    font-weight: bold;
                    cursor: pointer;
                "
            >
                RETRY_KERNEL_LINK
            </button>
        </div>

        <div id="app"></div>

        <script type="module">
            // Early error catching for white screen debugging
            window.onerror = function (msg, url, lineNo, columnNo, error) {
                const errorPanel = document.getElementById("early-boot-error");
                const message = document.getElementById("error-message");
                if (errorPanel && message) {
                    errorPanel.style.display = "flex";
                    message.textContent = `[ERROR]: ${msg}\n[LOC]: ${lineNo}:${columnNo}\n[REF]: ${url}`;
                }
                return false;
            };

            // Check if Tauri is actually injected
            setTimeout(() => {
                if (!window.__TAURI__ && !window.__TAURI_INTERNALS__) {
                    console.warn(
                        "Tauri internal bridge not detected. UI might be running outside of Tauri context.",
                    );
                }
            }, 1000);
        </script>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
